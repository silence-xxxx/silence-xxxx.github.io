<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        h1 { font-size: clamp(40px, 10vw, 60px); }
        p  { font-size: clamp(12px, 3vw, 18px); }
        h2 { font-size: clamp(16px, 4vw, 24px); }
        h3 { font-size: clamp(12px, 3vw, 18px); opacity: 0.5 }
        
        :root {
            /* 왼쪽 패널의 너비 공식 */
            --panel-w: 8%;
        }
        
        html, body {
            margin:0;
            padding:0;
            background:black;
            color:white;
            font-family:sans-serif;
            overflow:hidden;
        }

        /* 배경 */
        .bg {
            position:fixed;
            width:100%;
            height:100%;
            background:#000000 center/cover no-repeat;
            z-index:-1;
        }

        .center {
            position:fixed;
            top:50%;
            left:50%;
            width: 100%;
            transform:translate(-50%, -50%);
            display: inline-block; 
            white-space: nowrap;
            text-align:center;
        }

        .buttons {
            position:fixed;
            top:66%;
            left:50%;
            transform:translate(-50%, -25%);
            gap:20px;
            text-align:center;
        }
        
        .buttons a {
            margin:0;
            color:white;
            text-decoration:none;
            cursor:pointer;
        }

        /* 패널 (숨기기) */
        .panel {
            position:fixed;
            top:0;
            left:-500px; /* width보다 크게 */
            width:var(--panel-w);
            height:100%;
            background:rgba(0,0,0,0.8);
            padding:1px;
            transition:0.2s;
            overflow-y:auto;
            z-index:10;
        }
        .panel.active { left:0; }

        /* 닫기 버튼 */
        .close-btn {
            margin-bottom:10px;
            cursor:pointer;
            opacity:0.7;
        }

        /* 갤러리 */
        .grid {
            display:grid;
            grid-template-columns:repeat(1,1fr);
            gap:1px;
        }
        .grid img {
            width:100%;
            cursor:pointer;
        }

        .viewer {
            position: fixed;
            left: calc(var(--panel-w) + 2px); /* 패널 바로 오른쪽부터 시작 */
            top: 0;
            width: calc(100% - var(--panel-w) - 2px); /* 나머지 공간 전체 */
            height: 100vh;

            display: none;
            align-items: center;
            justify-content: center;

            /* 뷰어 주변 여백을 반투명 검정으로 채움 */
            background-color: rgba(0, 0, 0, 0.6);

            z-index:20;
            pointer-events:none; /* 클릭 비허용 */
        }

        .viewer img {
            position: relative;
            width: 100%;
            height: 100vh;
            object-fit:contain;
            pointer-events:auto; /* 클릭 허용 */
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="bg"></div>

<div class="center">
    <h1>( ' x ' )</h1>
</div>

<div class="buttons">
    <h3>- project silence -</h3>
    <h2><a onclick="toggleGallery()">Unwritten Saga: The Circle</a></h2>
</div>

<!-- 갤러리 -->
<div id="gallery" class="panel">
    <div class="close-btn" onclick="closePanels()">[ X ]</div>
    <div class="grid">
        <img src="the_circle/TheCircle_Gallery01.png" onclick="view(event, this.src)">
        <img src="the_circle/TheCircle_Gallery02.png" onclick="view(event, this.src)">
        <img src="the_circle/TheCircle_Gallery03.png" onclick="view(event, this.src)">
        <img src="the_circle/TheCircle_Gallery04.png" onclick="view(event, this.src)">
        <img src="the_circle/TheCircle_Gallery05.png" onclick="view(event, this.src)">
    </div>
</div>

<div id="viewer" class="viewer">
    <img id="big">
</div>

<script>
    function toggleGallery(){
        document.getElementById('gallery').classList.toggle('active');
        document.getElementById('music').classList.remove('active');
    }

    function closePanels(){
        closeViewer();
        document.getElementById('gallery').classList.remove('active');
        document.getElementById('music').classList.remove('active');
    }

    function view(e, src){
        e.stopPropagation(); // 이거 핵심
        document.getElementById('big').src = src;
        document.getElementById('viewer').style.display = 'flex';
    }

    function closeViewer(){
        document.getElementById('viewer').style.display = 'none';
    }

    document.getElementById('big').onclick = function(){
        closeViewer();
    };
</script>

</body>
</html>
